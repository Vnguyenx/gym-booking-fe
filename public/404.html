<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Gym Booking</title>
    <script>
        var l = window.location;
        var origin = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
        var path = l.pathname;
        var query = l.search ? l.search.slice(1) : '';
        var hash = l.hash;
        var redirect = origin + '/gym-booking-fe/?path=' + encodeURIComponent(path) + (query ? '&query=' + encodeURIComponent(query) : '') + hash;
        l.replace(redirect);
    </script>
</head>
<body></body>
</html>
